<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bliss AI</title>
    <style>
        :root { --accent: #00ff88; --bg: #0f172a; --panel: #1e293b; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: white; height: 100vh; margin: 0; display: flex; flex-direction: column; }
        
        header { padding: 1rem 2rem; background: var(--panel); border-bottom: 2px solid var(--accent); display: flex; align-items: center; justify-content: space-between; }
        h1 { margin: 0; font-size: 1.25rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }

        #chat-window { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1rem; }
        
        .msg { padding: 0.8rem 1.2rem; border-radius: 1rem; max-width: 75%; line-height: 1.5; font-size: 0.95rem; animation: fadeIn 0.3s ease; }
        .user { align-self: flex-end; background: var(--accent); color: #000; font-weight: 600; border-bottom-right-radius: 0; }
        .ai { align-self: flex-start; background: var(--panel); border: 1px solid #334155; border-bottom-left-radius: 0; }

        #input-form { padding: 1.5rem; background: var(--panel); display: flex; gap: 1rem; border-top: 1px solid #334155; }
        input { flex: 1; padding: 0.8rem 1rem; border-radius: 0.5rem; border: 1px solid #475569; background: var(--bg); color: white; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0, 255, 136, 0.2); }
        
        button { background: var(--accent); color: #000; border: none; padding: 0 1.5rem; border-radius: 0.5rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Thinking dots animation */
        .typing::after { content: '...'; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>
    <header><h1>Bliss AI</h1></header>
    <div id="chat-window">
        <div class="msg ai">Welcome. I am Bliss AI. How shall we proceed?</div>
    </div>
    <form id="input-form">
        <input type="text" id="user-input" placeholder="Type a message..." required autocomplete="off">
        <button type="submit">SEND</button>
    </form>

    <script>
        const form = document.getElementById('input-form');
        const chatWindow = document.getElementById('chat-window');
        const input = document.getElementById('user-input');

        function appendMessage(text, role, isTyping = false) {
            const div = document.createElement('div');
            div.className = `msg ${role} ${isTyping ? 'typing' : ''}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            input.value = '';

            const loadingMsg = appendMessage('Bliss is thinking', 'ai', true);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await response.json();
                loadingMsg.classList.remove('typing');
                loadingMsg.innerText = data.reply || "I encountered an empty response.";
            } catch (err) {
                loadingMsg.innerText = "Connection failed. Please check your API key.";
            }
        };
    </script>
</body>
</html>
